name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:
  release:
    types: [published]

permissions:
  pull-requests: write
  contents: write

jobs:
  release-plz:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_PLZ_TOKEN }}
      - run: sudo apt-get update && sudo apt-get install -y --no-install-recommends cmake libcurl4-openssl-dev
      - uses: dtolnay/rust-toolchain@stable
      - uses: MarcoIeni/release-plz-action@v0.5
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PLZ_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  build-cli:
    if: github.event_name == 'release' && startsWith(github.event.release.tag_name, 'oversync-v')
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-apple-darwin
            os: macos-latest
    runs-on: ${{ matrix.os }}
    env:
      TARGET: ${{ matrix.target }}
    steps:
      - uses: actions/checkout@v6
      - name: Install build deps (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends cmake libcurl4-openssl-dev
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Build CLI
        run: cargo build --release --features cli --target "$TARGET"
      - name: Package
        shell: bash
        run: |
          BIN="target/${TARGET}/release/oversync"
          ARCHIVE="oversync-${GITHUB_REF_NAME}-${TARGET}.tar.gz"
          tar czf "$ARCHIVE" -C "$(dirname "$BIN")" "$(basename "$BIN")"
          echo "ARCHIVE=$ARCHIVE" >> "$GITHUB_ENV"
      - name: Attach to release
        run: gh release upload "$GITHUB_REF_NAME" "$ARCHIVE"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
