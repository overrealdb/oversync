name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:
  release:
    types: [published]

permissions:
  pull-requests: write
  contents: write

jobs:
  release-plz-pr:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: write
    concurrency:
      group: release-plz-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_PLZ_TOKEN }}
          persist-credentials: false
      - run: sudo apt-get update && sudo apt-get install -y --no-install-recommends cmake libcurl4-openssl-dev
      - uses: dtolnay/rust-toolchain@stable
      - id: existing-release-pr
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PLZ_TOKEN }}
        run: |
          release_pr_number="$(gh pr list --state open --json number,headRefName --jq 'map(select(.headRefName | startswith("release-plz-")) | .number) | .[0] // empty')"
          if [[ -n "$release_pr_number" ]]; then
            echo "existing_release_pr=$release_pr_number" >> "$GITHUB_OUTPUT"
            echo "Open release PR #$release_pr_number already exists; skipping refresh due upstream release-plz PR commit parsing bug."
          fi
      - uses: taiki-e/install-action@v2
        if: steps.existing-release-pr.outputs.existing_release_pr == ''
        with:
          tool: release-plz@0.3.157
      - if: steps.existing-release-pr.outputs.existing_release_pr == ''
        run: release-plz release-pr --git-token "${GITHUB_TOKEN}" --repo-url "https://github.com/${GITHUB_REPOSITORY}" --config release-plz.toml
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PLZ_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  release-plz-release:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_PLZ_TOKEN }}
          persist-credentials: false
      - run: sudo apt-get update && sudo apt-get install -y --no-install-recommends cmake libcurl4-openssl-dev
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@v2
        with:
          tool: release-plz@0.3.157
      - run: release-plz release --git-token "${GITHUB_TOKEN}" --repo-url "https://github.com/${GITHUB_REPOSITORY}" --config release-plz.toml
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PLZ_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  build-cli:
    if: github.event_name == 'release' && startsWith(github.event.release.tag_name, 'oversync-v')
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-apple-darwin
            os: macos-latest
    runs-on: ${{ matrix.os }}
    env:
      TARGET: ${{ matrix.target }}
    steps:
      - uses: actions/checkout@v6
      - name: Install build deps (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends cmake libcurl4-openssl-dev
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Build CLI
        run: cargo build --release --features cli --target "$TARGET"
      - name: Package
        shell: bash
        run: |
          BIN="target/${TARGET}/release/oversync"
          ARCHIVE="oversync-${GITHUB_REF_NAME}-${TARGET}.tar.gz"
          tar czf "$ARCHIVE" -C "$(dirname "$BIN")" "$(basename "$BIN")"
          echo "ARCHIVE=$ARCHIVE" >> "$GITHUB_ENV"
      - name: Attach to release
        run: gh release upload "$GITHUB_REF_NAME" "$ARCHIVE"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
