name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  pull-requests: write
  contents: write

jobs:
  release-plz-pr:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: write
    concurrency:
      group: release-plz-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_PLZ_TOKEN }}
          persist-credentials: false
      - run: sudo apt-get update && sudo apt-get install -y --no-install-recommends cmake libcurl4-openssl-dev
      - uses: dtolnay/rust-toolchain@stable
      - id: existing-release-pr
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PLZ_TOKEN }}
        run: |
          release_pr_number="$(gh pr list --state open --json number,headRefName --jq 'map(select(.headRefName | startswith("release-plz-")) | .number) | .[0] // empty')"
          if [[ -n "$release_pr_number" ]]; then
            echo "existing_release_pr=$release_pr_number" >> "$GITHUB_OUTPUT"
            echo "Open release PR #$release_pr_number already exists; skipping refresh due upstream release-plz PR commit parsing bug."
          fi
      - uses: taiki-e/install-action@v2
        if: steps.existing-release-pr.outputs.existing_release_pr == ''
        with:
          tool: release-plz@0.3.157
      - if: steps.existing-release-pr.outputs.existing_release_pr == ''
        run: release-plz release-pr --git-token "${GITHUB_TOKEN}" --repo-url "https://github.com/${GITHUB_REPOSITORY}" --config release-plz.toml
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PLZ_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  release-plz-release:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_PLZ_TOKEN }}
          persist-credentials: false
      - run: sudo apt-get update && sudo apt-get install -y --no-install-recommends cmake libcurl4-openssl-dev
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@v2
        with:
          tool: release-plz@0.3.157
      - id: release-plz
        shell: bash
        run: |
          set -euo pipefail

          log_file="$(mktemp)"
          if release-plz release --git-token "${GITHUB_TOKEN}" --repo-url "https://github.com/${GITHUB_REPOSITORY}" --config release-plz.toml 2>&1 | tee "$log_file"; then
            echo "used_no_git_release=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if ! grep -q "failed to parse pr commits" "$log_file"; then
            echo "release-plz release failed for a reason other than the known PR commit parsing bug"
            exit 1
          fi

          echo "release-plz hit the known PR commit parsing bug; retrying without GitHub release creation"
          python3 - <<'PY'
          from pathlib import Path

          src = Path("release-plz.toml").read_text()
          needle = "git_release_enable = true"
          if needle not in src:
              raise SystemExit("expected git_release_enable = true in release-plz.toml")
          Path("/tmp/release-plz.no-github-release.toml").write_text(
              src.replace(needle, "git_release_enable = false", 1)
          )
          PY

          release-plz release --git-token "${GITHUB_TOKEN}" --repo-url "https://github.com/${GITHUB_REPOSITORY}" --config /tmp/release-plz.no-github-release.toml
          echo "used_no_git_release=true" >> "$GITHUB_OUTPUT"
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PLZ_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
      - name: Ensure root GitHub release exists after fallback
        if: steps.release-plz.outputs.used_no_git_release == 'true'
        shell: bash
        run: |
          set -euo pipefail

          version="$(python3 - <<'PY'
          import tomllib

          with open("Cargo.toml", "rb") as fp:
              cargo = tomllib.load(fp)
          print(cargo["workspace"]["package"]["version"])
          PY
          )"
          tag="oversync-v${version}"

          if gh release view "$tag" >/dev/null 2>&1; then
            echo "GitHub release $tag already exists"
            exit 0
          fi

          gh release create "$tag" \
            --title "oversync v${version}" \
            --generate-notes
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PLZ_TOKEN }}
