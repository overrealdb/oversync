name: CI
on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment: ${{ github.event_name == 'pull_request' && !startsWith(github.head_ref, 'release-plz-') && 'ci' || '' }}
    steps:
      - uses: actions/checkout@v6
      - run: sudo apt-get update && sudo apt-get install -y --no-install-recommends cmake libcurl4-openssl-dev
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ui/package-lock.json
      - name: Start shared test stack
        run: bash tests/stack/start.sh
      - name: Wait for shared test stack
        run: bash tests/stack/wait.sh
      - name: Check formatting
        run: cargo fmt --all --check
      - name: Run clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - name: Run test suite
        run: cargo test --workspace --features validate-docker
      - name: CLI smoke test
        run: cargo run --features cli -- --help
      - name: Verify generated OpenAPI SDK
        working-directory: ui
        run: |
          npm ci
          npm run verify:api
      - name: Stop shared test stack
        if: always()
        run: bash tests/stack/down.sh

  ui:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: ui
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ui/package-lock.json
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm run lint
      - run: npm run build
      - run: git diff --exit-code -- dist
      - run: npm test

  coverage:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: ci
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6
      - run: sudo apt-get update && sudo apt-get install -y --no-install-recommends cmake libcurl4-openssl-dev
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@cargo-llvm-cov
      - name: Start shared test stack
        run: bash tests/stack/start.sh
      - name: Wait for shared test stack
        run: bash tests/stack/wait.sh
      - name: Generate coverage
        run: cargo llvm-cov --workspace --features validate-docker --lcov --output-path lcov.info
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: lcov.info
          fail_ci_if_error: false
      - name: Stop shared test stack
        if: always()
        run: bash tests/stack/down.sh

  stress:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - run: sudo apt-get update && sudo apt-get install -y --no-install-recommends cmake libcurl4-openssl-dev
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Start shared test stack
        run: bash tests/stack/start.sh
      - name: Wait for shared test stack
        run: bash tests/stack/wait.sh
      - name: Run ignored stress suite
        run: cargo test --workspace --features validate-docker -- --ignored
      - name: Stop shared test stack
        if: always()
        run: bash tests/stack/down.sh
