[graph]
targets = []
all-features = false

[advisories]
version = 2
ignore = []

[licenses]
version = 2
allow = [
	"MIT",
	"Apache-2.0",
	"Apache-2.0 WITH LLVM-exception",
	"BSD-2-Clause",
	"BSD-3-Clause",
	"ISC",
	"Unicode-3.0",
	"Unicode-DFS-2016",
	"Zlib",
	"CC0-1.0",
	"OpenSSL",
	"BSL-1.0",
	"MPL-2.0",
]
confidence-threshold = 0.8

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
